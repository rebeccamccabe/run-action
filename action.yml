name: Run Calkit
description: >
  Run a Calkit project pipeline and optionally commit and push results to
  Git and DVC remotes.
branding:
  icon: arrow-right
  color: green

inputs:
  save:
    description: Whether or not to save (commit and push) results to Git and DVC remotes.
    default: "true"
  dvc_token:
    description: DVC token for pushing results. If not provided, will be obtained via GitHub OIDC.
    required: false
  pull_dvc:
    description: Whether or not to pull DVC data before running.
    required: false
    default: "true"
  cache_dvc:
    description: Whether or not to cache DVC data.
    required: false
    default: "true"
  run_args:
    description: Arguments passed to calkit run command.
    required: false
    default: ""

outputs: {}

runs:
  using: composite
  steps:

    - name: Restore DVC cache
      if: ${{ inputs.cache_dvc == 'true' }}
      id: cache-dvc-restore
      uses: actions/cache/restore@v5
      with:
        path: .dvc/cache
        key: dvc-cache-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('dvc.lock') }}
        restore-keys: |
          dvc-cache-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
          dvc-cache-${{ runner.os }}-${{ github.base_ref }}-
          dvc-cache-${{ runner.os }}-main-
          dvc-cache-${{ runner.os }}-

    # Validate the DVC cache integrity; if broken, delete it
    - name: Validate DVC cache integrity
      if: ${{ inputs.cache_dvc == 'true' }}
      shell: bash
      run: |
        if ! dvc status -c; then
          echo "DVC cache inconsistent (status check failed). Deleting cache."
          rm -rf .dvc/cache
          exit 0
        fi
    - name: debug token condition
      shell: bash
      run: echo ${{ !inputs.dvc_token && (inputs.save == 'true' || inputs.pull_dvc == 'true' || contains(inputs.run_args,'--pull')) }}
    - name: Get GitHub OIDC token
      if: ${{ !inputs.dvc_token && (inputs.save == 'true' || inputs.pull_dvc == 'true' || contains(inputs.run_args,'--pull')) }}
      id: get-oidc-token
      shell: bash
      run: |
        OIDC_TOKEN=$(curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=calkit.io" -s | jq -r '.value')
        if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" == "null" ]; then
          echo "Failed to obtain OIDC token"
          exit 1
        fi
        echo "::add-mask::$OIDC_TOKEN"
        echo "oidc-token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

    - name: Exchange OIDC token for Calkit DVC token
      if: ${{ !inputs.dvc_token && (inputs.save == 'true' || inputs.pull_dvc == 'true' || contains(inputs.run_args,'--pull')) }}
      id: get-dvc-token
      shell: bash
      run: |
        CALKIT_DVC_TOKEN=$(curl -X POST https://api.calkit.io/login/github-oidc \
          -H "Authorization: Bearer ${{ steps.get-oidc-token.outputs.oidc-token }}" \
          -s | jq -r '.access_token')
        if [ -z "$CALKIT_DVC_TOKEN" ] || [ "$CALKIT_DVC_TOKEN" == "null" ]; then
          echo "Failed to obtain Calkit DVC token"
          exit 1
        fi
        echo "::add-mask::$CALKIT_DVC_TOKEN"
        echo "dvc-token=$CALKIT_DVC_TOKEN" >> $GITHUB_OUTPUT

    - name: Configure DVC remote auth
      if: ${{ inputs.save == 'true' || inputs.pull_dvc == 'true' || contains(inputs.run_args,'--pull') }}
      shell: bash
      run: calkit config remote-auth
      env:
        CALKIT_DVC_TOKEN: ${{ inputs.dvc_token || steps.get-dvc-token.outputs.dvc-token }}

    # Always treat remote as truth; local cache is just acceleration
    - name: Pull DVC data
      if: ${{ inputs.pull_dvc == 'true' }}
      shell: bash
      run: calkit dvc pull
      continue-on-error: true

    - name: Run pipeline
      shell: bash
      run: calkit run ${{ inputs.run_args }}

    - name: Save results
      if: ${{ inputs.save == 'true' }}
      shell: bash
      run: calkit save -am "Run pipeline"
      env:
        CALKIT_DVC_TOKEN: ${{ inputs.dvc_token || steps.get-dvc-token.outputs.dvc-token }}

    # Prune cache before saving so it doesn't grow without bound
    - name: Prune DVC cache (gc)
      if: ${{ inputs.cache_dvc == 'true' }}
      shell: bash
      run: |
        calkit dvc gc --workspace --force || true

    # Hard guard: if too big, don't upload it (prevents partial cache saves)
    - name: Enforce DVC cache size limit
      if: ${{ inputs.cache_dvc == 'true' }}
      shell: bash
      run: |
        if [ -d ".dvc/cache" ]; then
          CACHE_SIZE_MB=$(du -sm .dvc/cache | cut -f1)
          echo "DVC cache size: ${CACHE_SIZE_MB} MB"
          if [ "$CACHE_SIZE_MB" -gt 9000 ]; then
            echo "DVC cache exceeds 9000 MB; deleting to avoid corrupted GitHub cache upload."
            rm -rf .dvc/cache
          fi
        fi

    - name: Save DVC cache
      if: ${{ inputs.cache_dvc == 'true' }}
      id: cache-dvc-save
      uses: actions/cache/save@v5
      with:
        path: .dvc/cache
        key: ${{ runner.os }}-dvc-cache-${{ github.head_ref || github.ref_name }}-${{ hashFiles('dvc.lock') }}
